# WAS 자동 확장 정책
apiVersion: autoscaling/v1
kind: HorizontalPodAutoscaler
metadata:
  name: was-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: was-deployment
  minReplicas: 2    # 최소 2개 유지
  maxReplicas: 10   # 부하 시 최대 10개까지 증식
  targetCPUUtilizationPercentage: 50 # CPU가 50% 넘으면 파드 추가

---
# WEB 자동 확장 정책
apiVersion: autoscaling/v1
kind: HorizontalPodAutoscaler
metadata:
  name: web-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web-deployment
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 50