<VirtualHost *:80>
    # 웹 루트 디렉토리 설정
    DocumentRoot /var/www/html/Service
    # 접속 시 처음 보여줄 파일 우선순위
    DirectoryIndex index.php index.html

    # [핵심 라인] PHP 요청 처리 위임
    # 사용자가 .php 파일(로그인 등)을 요청하면 -> 'was'라는 이름의 서버 9000번 포트로 토스합니다.
    # K8s에서는 'was'가 내부 DNS(ClusterIP)로 작동해 자동으로 부하분산됩니다.
    ProxyPassMatch ^/(.*\.php(/.*)?)$ fcgi://was:9000/var/www/html/Service/$1

    # [권한 설정 1] 상위 디렉토리 허용 (CSS/이미지 로딩 문제 방지)
    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # [권한 설정 2] 서비스 디렉토리 허용
    <Directory /var/www/html/Service>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # 로그 파일 위치 설정
    ErrorLog /usr/local/apache2/logs/error.log
    CustomLog /usr/local/apache2/logs/access.log combined
</VirtualHost>